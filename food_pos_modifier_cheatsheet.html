<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food POS Modifier Cheat Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-mid: rgba(0,0,0,0.18);
    --text-primary: #1a1a18;
    --text-secondary: #5a5a56;
    --text-tertiary: #9a9a94;
    --radius-md: 8px;
    --radius-lg: 14px;
    --font: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1.5rem 4rem;
  }

  header {
    max-width: 1200px;
    margin: 0 auto 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 0.5px solid var(--border-mid);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }

  header p {
    font-size: 14px;
    color: var(--text-tertiary);
    margin-top: 4px;
  }

  .filter-bar {
    max-width: 1200px;
    margin: 0 auto 1.75rem;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .filter-btn {
    font-family: var(--font);
    font-size: 13px;
    padding: 6px 16px;
    border-radius: 20px;
    border: 0.5px solid var(--border-mid);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s ease;
    font-weight: 400;
  }

  .filter-btn:hover {
    border-color: rgba(0,0,0,0.3);
    color: var(--text-primary);
  }

  .filter-btn.active {
    background: var(--text-primary);
    color: #fff;
    border-color: var(--text-primary);
    font-weight: 500;
  }

  .grid {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem 1.25rem;
    transition: opacity 0.2s;
  }

  .card.hidden { display: none; }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  .card-tag {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 10px;
    margin-left: auto;
    white-space: nowrap;
  }

  .screen { margin-bottom: 10px; }

  .screen-label {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-tertiary);
    margin-bottom: 6px;
  }

  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .pill {
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 10px;
    border: 0.5px solid var(--border);
    color: var(--text-secondary);
    background: #fafaf8;
    line-height: 1.4;
  }

  .pill.note {
    font-style: italic;
    color: var(--text-tertiary);
    background: none;
    border-color: transparent;
    padding-left: 0;
  }

  .divider {
    border: none;
    border-top: 0.5px solid var(--border);
    margin: 10px 0;
  }

  .count-bar {
    font-size: 12px;
    color: var(--text-tertiary);
    max-width: 1200px;
    margin: 0 auto 1rem;
    font-family: var(--font-mono);
  }
</style>
</head>
<body>

<header>

  </div>

      { label: "Screen 3 — add-ons / toppings", items: ["Extra cheese","Bacon","Jalapeños","Sour cream","Guacamole","Pico de gallo","Chili","Green onions","Olives (nachos)","Ground beef (nachos)","Chicken (nachos / quesadilla)"] },

const filtersEl = document.getElementById('filters');
const gridEl = document.getElementById('grid');
const countBarEl = document.getElementById('countBar');

function updateCount(active) {
  const total = categories.length;
  const showing = active === 'all' ? total : 1;
  countBarEl.textContent = showing === total
    ? `Showing all ${total} categories`
    : `Showing 1 of ${total} categories`;
}

const allBtn = document.createElement('button');
allBtn.className = 'filter-btn active';
allBtn.textContent = 'All';
allBtn.dataset.id = 'all';
filtersEl.appendChild(allBtn);

categories.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = cat.label;
  btn.dataset.id = cat.id;
  filtersEl.appendChild(btn);
});

categories.forEach(cat => {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id = cat.id;

  let html = `<div class="card-header">
    <div class="card-title">${cat.label}</div>
    <span class="card-tag" style="color:${cat.tagColor};background:${cat.tagBg}">${cat.tag}</span>
  </div>`;

  cat.screens.forEach((screen, i) => {
    if (i > 0) html += '<hr class="divider">';
    html += `<div class="screen"><div class="screen-label">${screen.label}</div><div class="pills">`;
    screen.items.forEach(item => {
      const isNote = item.startsWith('No ') || item.startsWith('Add ') || item.startsWith('Extra ') || item.startsWith('Light ') || item.includes('+$');
      html += `<span class="pill${isNote ? ' note' : ''}">${item}</span>`;
    });
    html += '</div></div>';
  });

  card.innerHTML = html;
  gridEl.appendChild(card);
});

updateCount('all');

filtersEl.addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const id = btn.dataset.id;
  document.querySelectorAll('.card').forEach(card => {
    card.classList.toggle('hidden', id !== 'all' && card.dataset.id !== id);
  });
  updateCount(id);
});
</script>
</body>
</html>
